services:
  mariadb:
    image: mariadb:latest
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=convora
      - MYSQL_USER=convora
      - MYSQL_PASSWORD=convora_password
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: convora-backend:local
    ports:
      - "8400:8000"
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./SeedData:/app/backend/SeedData
      - ./backend/.env:/app/backend/.env
    environment:
      - PYTHONPATH=/app/backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    image: convora-admin:local
    ports:
      - "8401:5000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./admin:/app:cached
      - /app/node_modules
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:8400
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PORT=8401
      - WATCHPACK_POLLING=true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mariadb_data:
